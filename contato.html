<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>

<div class="container">

    <h1>Contato</h1>

    <form class="formulario">

        <fieldset>

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome"><br><br>

            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" name="telefone"><br><br>

            <label for="email">Email:</label>
            <input type="text" id="email" name="email"><br><br>

            <label for="foto">Escolha uma foto:</label>
            <input type="file" id="foto" name="foto"><br><br>

            <label for="estado">Selecione um estado:</label>
            <select id="estado" name="estado">
                <option value="SP">São Paulo</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="MG">Minas Gerais</option>
                <option value="ES">Espírito Santo</option>
                <option value="PR">Paraná</option>
            </select><br><br>

            <label for="obs">Mensagem:</label>
            <textarea id="obs" name="mensagem"></textarea><br><br>

            <input type="button" value="Enviar" onclick="window.location.href='img/contato.png'">
            <input type="reset" value="Desfazer alterações">

        </fieldset>

    </form>

</div>

</body>
